name: Container Based CI/CD

on:
  push:
    branches:
      - main

jobs:
  container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t demo-app -f docker/Dockerfile .

      - name: Tag Image
        run: docker tag demo-app ch33kiran/demo-app:latest

      - name: Push Image
        run: docker push ch33kiran/demo-app:latest

      - name: Deploy Container
        run: echo "Deploying container"